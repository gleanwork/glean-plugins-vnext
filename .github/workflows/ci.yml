name: Build and test

on:
  pull_request:
    branches: [main]
  workflow_call: 

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run type checker
        run: npm run typecheck
        
      - name: Build
        run: npm run build
        
      - name: Verify dist is up to date
        run: git diff --exit-code plugins/glean/dist/ || (echo "dist/index.js is out of sync with source. Run 'npm run build' and commit the result." && exit 1)

      - name: Test
        run: npm test
